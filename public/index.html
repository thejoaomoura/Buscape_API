<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔎</text></svg>">
    <title>BuscapéAPI - Pesquisa de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- HeroUI V2 -->
    <link rel="stylesheet" href="https://unpkg.com/@heroui/theme@latest/dist/index.css"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-100 min-h-screen" data-theme="light">
    <!-- Theme Toggle Button -->
    <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
        <i data-lucide="sun"></i>
    </button>

    <!-- Test Page Button -->
    <a 
        id="testPageBtn" 
        href="/test-monitor.html"
        class="test-page-btn hidden" 
        aria-label="Página de Teste"
        title="Página de Teste - Desenvolvimento"
    >
        🐛
    </a>

    <div class="container mx-auto px-4 py-8" x-data="{ 
        activeFilters: 0,
        sortBy: '',
        minPrice: '',
        maxPrice: '',
        rating: '',
        applyFilters() {
            // Implementar lógica de filtros aqui
            this.activeFilters = [this.sortBy, this.minPrice, this.maxPrice, this.rating]
                .filter(f => f !== '').length;
        }
    }">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">BuscapéAPI</h1>
            <p class="text-gray-600">Encontre as melhores ofertas em um só lugar</p>
        </header>

        <!-- Search Form -->
        <div class="max-w-4xl mx-auto mb-6">
            <div class="relative flex items-center">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Digite o nome do produto ou categoria que deseja encontrar..."
                    class="w-full px-6 py-4 text-lg rounded-full border-2 border-gray-300 focus:border-blue-500 focus:outline-none shadow-sm transition-all duration-300"
                >
                <button 
                    id="searchButton"
                    class="absolute right-4 p-2 text-blue-600 hover:text-blue-800 transition-colors group"
                    aria-label="Pesquisar"
                >
                    <i data-lucide="search" class="w-6 h-6 transform group-hover:scale-110 transition-transform"></i>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="max-w-4xl mx-auto mb-8">
            <div class="flex flex-wrap items-center gap-3">
                <!-- Filtro principal com indicador -->
                <button 
                    data-filter-button
                    class="flex items-center gap-2 px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-800 font-medium hover:bg-gray-50 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    @click="$refs.filterModal.classList.remove('hidden')"
                >
                    <i data-lucide="sliders" class="w-4 h-4 text-blue-600"></i>
                    Todos os filtros
                    <span 
                        x-show="activeFilters > 0"
                        x-text="activeFilters"
                        class="ml-1 w-5 h-5 text-xs bg-blue-600 text-white font-bold rounded-full flex items-center justify-center"
                    ></span>
                </button>

                <!-- Filtro de Preço -->
                <div x-data="{ open: false }" class="relative">
                    <button 
                        data-filter-button
                        @click="open = !open" 
                        class="px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-800 font-medium hover:bg-gray-50 transition-all duration-300 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    >
                        <i data-lucide="dollar-sign" class="w-4 h-4 text-blue-600 mr-2"></i>
                        <span>Preço</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 ml-2 transform transition-transform" :class="{ 'rotate-180': open }"></i>
                    </button>
                    <div 
                        x-show="open" 
                        @click.away="open = false"
                        class="absolute left-0 mt-2 w-72 bg-white border border-gray-200 rounded-lg shadow-lg p-4 z-10 transform origin-top transition-all duration-300"
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 scale-95"
                        x-transition:enter-end="opacity-100 scale-100"
                        x-transition:leave="transition ease-in duration-150"
                        x-transition:leave-start="opacity-100 scale-100"
                        x-transition:leave-end="opacity-0 scale-95"
                    >
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Ordenar por</label>
                                <select 
                                    id="priceSort"
                                    class="w-full p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-300"
                                >
                                    <option value="">Relevância</option>
                                    <option value="asc">Menor Preço</option>
                                    <option value="desc">Maior Preço</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Faixa de Preço</label>
                                <div class="flex items-center space-x-4">
                                    <div class="relative flex-1">
                                        <span class="absolute left-3 top-2 text-gray-500">R$</span>
                                        <input 
                                            type="number" 
                                            id="minPrice" 
                                            placeholder="Min" 
                                            class="w-full pl-10 p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-300"
                                        >
                                    </div>
                                    <div class="relative flex-1">
                                        <span class="absolute left-3 top-2 text-gray-500">R$</span>
                                        <input 
                                            type="number" 
                                            id="maxPrice" 
                                            placeholder="Max" 
                                            class="w-full pl-10 p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-300"
                                        >
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filtro de Avaliação -->
                <div x-data="{ open: false }" class="relative">
                    <button 
                        data-filter-button
                        @click="open = !open" 
                        class="px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-800 font-medium hover:bg-gray-50 transition-all duration-300 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    >
                        <i data-lucide="star" class="w-4 h-4 text-yellow-400 mr-2"></i>
                        <span>Avaliação</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 ml-2 transform transition-transform" :class="{ 'rotate-180': open }"></i>
                    </button>
                    <div 
                        x-show="open" 
                        @click.away="open = false"
                        class="absolute left-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-10 transform origin-top transition-all duration-300"
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 scale-95"
                        x-transition:enter-end="opacity-100 scale-100"
                        x-transition:leave="transition ease-in duration-150"
                        x-transition:leave-start="opacity-100 scale-100"
                        x-transition:leave-end="opacity-0 scale-95"
                    >
                        <div class="p-2">
                            <button class="w-full text-left px-4 py-2 hover:bg-gray-50 rounded-md transition-colors duration-300 flex items-center group">
                                <div class="flex text-yellow-400 mr-2">
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                </div>
                                <span class="group-hover:text-blue-600">4+ estrelas</span>
                            </button>
                            <button class="w-full text-left px-4 py-2 hover:bg-gray-50 rounded-md transition-colors duration-300 flex items-center group">
                                <div class="flex text-yellow-400 mr-2">
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                    <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                </div>
                                <span class="group-hover:text-blue-600">3+ estrelas</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Limpar Filtros -->
                <button 
                    id="clearFilters"
                    class="px-4 py-2 text-red-600 hover:text-red-800 font-medium transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 rounded-full flex items-center ml-auto"
                >
                    <i data-lucide="x" class="w-4 h-4 mr-2"></i>
                    Limpar Filtros
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden">
            <div class="flex justify-center items-center space-x-2">
                <i data-lucide="loader" class="w-6 h-6 text-blue-600 loading"></i>
                <span class="text-gray-600">Buscando produtos...</span>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Products will be inserted here -->
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden text-center text-red-600 mt-4">
            <!-- Error messages will be shown here -->
        </div>

        <!-- Modal de Filtros -->
        <div 
            x-ref="filterModal"
            class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center"
            @click.self="$refs.filterModal.classList.add('hidden')"
        >
            <div class="bg-white rounded-lg p-6 max-w-lg w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-900">Todos os Filtros</h3>
                    <button 
                        @click="$refs.filterModal.classList.add('hidden')"
                        class="text-gray-400 hover:text-gray-500"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Filtros do Modal -->
                <div class="space-y-6">
                    <!-- Ordenação por Preço -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ordenar por Preço</label>
                        <select 
                            class="w-full p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                            x-model="sortBy"
                        >
                            <option value="">Relevância</option>
                            <option value="asc">Menor Preço</option>
                            <option value="desc">Maior Preço</option>
                        </select>
                    </div>

                    <!-- Faixa de Preço -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Faixa de Preço</label>
                        <div class="flex items-center space-x-4">
                            <div class="relative flex-1">
                                <span class="absolute left-3 top-2 text-gray-500">R$</span>
                                <input 
                                    type="number" 
                                    placeholder="Min" 
                                    class="w-full pl-10 p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                    x-model="minPrice"
                                >
                            </div>
                            <div class="relative flex-1">
                                <span class="absolute left-3 top-2 text-gray-500">R$</span>
                                <input 
                                    type="number" 
                                    placeholder="Max" 
                                    class="w-full pl-10 p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                    x-model="maxPrice"
                                >
                            </div>
                        </div>
                    </div>

                    <!-- Avaliação -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Avaliação Mínima</label>
                        <div class="space-y-2">
                            <button 
                                class="w-full text-left px-4 py-2 hover:bg-gray-100 rounded flex items-center"
                                @click="rating = '4'; applyFilters()"
                            >
                                <i data-lucide="star" class="w-4 h-4 text-yellow-400 mr-2"></i>
                                4+ estrelas
                            </button>
                            <button 
                                class="w-full text-left px-4 py-2 hover:bg-gray-100 rounded flex items-center"
                                @click="rating = '3'; applyFilters()"
                            >
                                <i data-lucide="star" class="w-4 h-4 text-yellow-400 mr-2"></i>
                                3+ estrelas
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Botões do Modal -->
                <div class="mt-6 flex justify-end space-x-3">
                    <button 
                        @click="$refs.filterModal.classList.add('hidden')"
                        class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium"
                    >
                        Cancelar
                    </button>
                    <button 
                        @click="applyFilters(); $refs.filterModal.classList.add('hidden')"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-medium"
                    >
                        Aplicar Filtros
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal de Monitoramento de Preço -->
        <div 
            id="monitorModal"
            class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"
            @click.self="document.getElementById('monitorModal').classList.add('hidden')"
        >
            <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full transform transition-all modal-container">
                <!-- Header do Modal -->
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-6 rounded-t-2xl modal-header">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="bell" class="w-6 h-6"></i>
                            <h3 class="text-xl font-bold">Monitorar Preço</h3>
                        </div>
                        <button 
                            onclick="document.getElementById('monitorModal').classList.add('hidden')"
                            class="text-white hover:bg-white hover:bg-opacity-20 rounded-full p-1 transition-all"
                        >
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Corpo do Modal -->
                <div class="p-6 modal-body">
                    <!-- Informações do Produto -->
                    <div id="modalProductInfo" class="mb-6 p-4 bg-gray-50 rounded-lg modal-product-card">
                        <div class="flex items-start space-x-4">
                            <!-- Imagem do produto com efeito Blurred do HeroUI -->
                            <div class="heroui-image-wrapper-modal w-20 h-20 relative overflow-hidden rounded-lg flex-shrink-0">
                                <!-- Imagem de fundo borrada -->
                                <div class="heroui-blurred-img-modal absolute inset-0">
                                    <img 
                                        id="modalProductImageBlurred" 
                                        src="" 
                                        alt=""
                                        class="w-full h-full object-cover blur-md scale-110 opacity-60"
                                    >
                                </div>
                                <!-- Imagem principal -->
                                <div class="heroui-img-modal relative z-10 flex items-center justify-center h-full">
                                    <img 
                                        id="modalProductImage" 
                                        src="" 
                                        alt="" 
                                        class="object-contain max-w-full max-h-full p-1"
                                    >
                                </div>
                            </div>
                            <div class="flex-1">
                                <h4 id="modalProductName" class="font-semibold text-gray-800 modal-text text-sm line-clamp-2"></h4>
                                <p id="modalProductPrice" class="text-blue-600 font-bold text-lg mt-1"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Formulário -->
                    <form id="monitorForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <i data-lucide="mail" class="w-4 h-4 inline mr-1"></i>
                                Seu E-mail
                            </label>
                            <input 
                                type="email" 
                                id="monitorEmail"
                                placeholder="seu@email.com"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <i data-lucide="target" class="w-4 h-4 inline mr-1"></i>
                                Preço Alvo (R$)
                            </label>
                            
                            <!-- Botões de Escolha Rápida -->
                            <div class="flex gap-2 mb-3">
                                <button 
                                    type="button"
                                    onclick="setQuickPrice(80)"
                                    class="flex-1 px-3 py-2 bg-green-50 text-green-700 border border-green-200 rounded-lg hover:bg-green-100 transition-all text-sm font-medium"
                                >
                                    <div class="flex flex-col items-center">
                                        <span class="text-xs opacity-75">20% OFF</span>
                                        <span class="font-bold">80%</span>
                                    </div>
                                </button>
                                <button 
                                    type="button"
                                    onclick="setQuickPrice(50)"
                                    class="flex-1 px-3 py-2 bg-orange-50 text-orange-700 border border-orange-200 rounded-lg hover:bg-orange-100 transition-all text-sm font-medium"
                                >
                                    <div class="flex flex-col items-center">
                                        <span class="text-xs opacity-75">50% OFF</span>
                                        <span class="font-bold">50%</span>
                                    </div>
                                </button>
                                <button 
                                    type="button"
                                    onclick="setQuickPrice(25)"
                                    class="flex-1 px-3 py-2 bg-red-50 text-red-700 border border-red-200 rounded-lg hover:bg-red-100 transition-all text-sm font-medium"
                                >
                                    <div class="flex flex-col items-center">
                                        <span class="text-xs opacity-75">75% OFF</span>
                                        <span class="font-bold">25%</span>
                                    </div>
                                </button>
                            </div>
                            
                            <input 
                                type="number" 
                                id="monitorTargetPrice"
                                placeholder="0.00"
                                step="0.01"
                                min="0"
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            >
                            <p class="text-xs text-gray-500 mt-1">
                                <i data-lucide="info" class="w-3 h-3 inline"></i>
                                Você receberá um e-mail quando o preço atingir ou ficar abaixo deste valor
                            </p>
                        </div>

                        <!-- Botões -->
                        <div class="flex space-x-3 pt-4">
                            <button 
                                type="button"
                                onclick="document.getElementById('monitorModal').classList.add('hidden')"
                                class="flex-1 px-4 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium transition-all"
                            >
                                Cancelar
                            </button>
                            <button 
                                type="submit"
                                class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg hover:from-blue-700 hover:to-purple-700 font-medium transition-all shadow-lg hover:shadow-xl flex items-center justify-center space-x-2"
                            >
                                <i data-lucide="bell-ring" class="w-4 h-4"></i>
                                <span>Monitorar</span>
                            </button>
                        </div>
                    </form>

                    <!-- Mensagem de Sucesso/Erro -->
                    <div id="monitorMessage" class="hidden mt-4 p-3 rounded-lg"></div>
                </div>
            </div>
        </div>

        <!-- Link para página de produtos monitorados -->
        <a 
            href="/monitor.html" 
            class="fixed bottom-6 right-6 bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-110 z-40"
            title="Meus Produtos Monitorados"
        >
            <i data-lucide="list" class="w-6 h-6"></i>
        </a>

        <!-- Toast Container -->
        <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none">
            <!-- Toasts serão inseridos aqui -->
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/monitor.js"></script>
</body>
</html>
